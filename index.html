<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity 箱あけ計算ツール (完成版)</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1b113a 0%, #0b071e 100%);
            color: #e0d7ff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #aa99ff;
            text-shadow: 0 0 10px rgba(170, 153, 255, 0.5);
            margin-bottom: 20px;
        }
        .account-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(170, 153, 255, 0.4);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .account-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #aa99ff;
            margin-bottom: 10px;
        }
        .account-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .account-select {
            flex: 1;
            min-width: 150px;
            padding: 8px;
            background: #1b113a;
            color: white;
            border: 1px solid #7b2cbf;
            border-radius: 6px;
            font-weight: bold;
        }
        .acc-btn {
            background: #4a3b8c; color: white; border: none; padding: 8px 12px;
            border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: bold;
        }
        .acc-btn:hover { background: #5c4da3; }
        .acc-btn.delete { background: #cc3333; }
        .acc-btn.delete:hover { background: #e54444; }

        .mode-selector-box {
            background: rgba(170, 153, 255, 0.15);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(170, 153, 255, 0.3);
            text-align: center;
        }
        .mode-selector-box p {
            margin: 0 0 10px 0;
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
        }
        .radio-group {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .radio-label {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(170, 153, 255, 0.2);
            transition: all 0.2s;
            font-weight: bold;
            text-align: center;
        }
        .radio-label:hover { background: rgba(170, 153, 255, 0.1); }
        .radio-group input[type="radio"] { display: none; }
        .radio-group input[type="radio"]:checked + .radio-label {
            background: linear-gradient(135deg, #7b2cbf 0%, #9d4edd 100%);
            border-color: #aa99ff;
            color: #fff;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
        }

        .selector-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .selector-box label { font-size: 0.9rem; color: #aa99ff; font-weight: bold; }
        select {
            width: 100%; padding: 10px; border-radius: 8px; background: #25194d;
            color: white; border: 1px solid #4a3b8c; font-size: 1rem; cursor: pointer;
        }

        .gift-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .gift-item {
            background: rgba(255, 255, 255, 0.06); padding: 15px; border-radius: 14px;
            border: 1px solid rgba(170, 153, 255, 0.15); position: relative;
        }
        .remove-btn {
            position: absolute; top: 12px; right: 12px; background: transparent;
            color: #ff6666; border: none; cursor: pointer; font-size: 0.85rem;
        }
        .gift-main-info { margin-bottom: 12px; }
        .gift-name { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .gift-pt { font-size: 0.85rem; color: #aa99ff; margin-left: 10px; }
        
        .input-row {
            display: flex; flex-wrap: wrap; gap: 15px; background: rgba(0, 0, 0, 0.2);
            padding: 12px; border-radius: 10px;
        }
        .control-group { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .counter { display: flex; align-items: center; gap: 4px; }
        .btn {
            background: #4a3b8c; color: white; border: none; width: 26px; height: 26px;
            border-radius: 50%; cursor: pointer; font-size: 0.9rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .btn:hover { background: #5c4da3; }
        .input-val {
            width: 45px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(170, 153, 255, 0.3);
            color: white; text-align: center; font-size: 0.9rem; font-weight: bold; padding: 4px; border-radius: 4px;
        }

        .calc-btn {
            width: 100%; background: linear-gradient(135deg, #7b2cbf 0%, #9d4edd 100%);
            color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4);
        }
        .calc-btn:hover { opacity: 0.9; }

        .result-section { margin-top: 25px; }
        .result-title { font-size: 1.1rem; color: #aa99ff; margin-bottom: 15px; border-left: 4px solid #7b2cbf; padding-left: 10px; }
        .result-card { background: rgba(123, 44, 191, 0.15); border: 1px solid rgba(157, 78, 221, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .result-card.perfect { border: 2px solid #2bc4bf; background: rgba(43, 196, 191, 0.08); }
        .card-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 5px; }
        .header-actions { display: flex; gap: 8px; }
        .card-tag { display: inline-block; background: #7b2cbf; font-size: 0.75rem; padding: 3px 8px; border-radius: 20px; font-weight: bold; }
        .result-card.perfect .card-tag { background: #2bc4bf; color: #0b071e; }
        
        .consume-btn { background: #9d4edd; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .consume-btn:hover { opacity: 0.9; }
        .result-card.perfect .consume-btn { background: #2bc4bf; color: #0b071e; }
        
        .copy-btn { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .copy-btn:hover { background: rgba(255, 255, 255, 0.3); }

        .result-details { list-style: none; padding: 0; margin: 0 0 10px 0; }
        .result-details li { padding: 5px 0; display: flex; justify-content: space-between; font-size: 0.95rem; }
        .expiry-badge { background: #ff4d4d; color: white; font-size: 0.75rem; padding: 1px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
        .total-status { text-align: right; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; color: #ff99dd; }
        .result-card.perfect .total-status { color: #2bc4bf; }
        .no-result { text-align: center; color: #8a7ccb; padding: 20px; line-height: 1.6; }
        .perfect-failed-msg { text-align: center; background: rgba(255, 77, 77, 0.08); border: 1px dashed rgba(255, 77, 77, 0.3); border-radius: 12px; padding: 15px; color: #ff8888; font-size: 0.9rem; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌌 Gravity 箱あけ計算ツール</h1>
    
    <div class="account-box">
        <div class="account-title">👥 操作中のアカウント：</div>
        <div class="account-controls">
            <select id="accountSelector" class="account-select" onchange="switchAccount(this.value)"></select>
            <button class="acc-btn" onclick="addNewAccount()">➕ 追加</button>
            <button class="acc-btn" onclick="renameCurrentAccount()">✏️ 名前変更</button>
            <button class="acc-btn delete" onclick="deleteCurrentAccount()">🗑️ 削除</button>
        </div>
    </div>

    <div class="mode-selector-box">
        <p>✨ 箱あけの種類を選択：</p>
        <div class="radio-group">
            <input type="radio" id="mode1-5" name="targetMode" value="3000" checked onchange="updateTargetDisplay()">
            <label for="mode1-5" class="radio-label">1-5<br>(3000 pt)</label>
            <input type="radio" id="mode1-6" name="targetMode" value="6000" onchange="updateTargetDisplay()">
            <label for="mode1-6" class="radio-label">1-6<br>(6000 pt)</label>
            <input type="radio" id="mode1-7" name="targetMode" value="9000" onchange="updateTargetDisplay()">
            <label for="mode1-7" class="radio-label">1-7<br>(9000 pt)</label>
        </div>
    </div>

    <div class="selector-box">
        <label for="giftSelector">🎁 手持ちのギフトを選択して追加：</label>
        <select id="giftSelector" onchange="addGiftFromSelector()">
            <option value="">-- ギフト一覧から選ぶ --</option>
        </select>
    </div>

    <div class="gift-list" id="selectedGiftContainer"></div>

    <button class="calc-btn" onclick="calculateCombinations()">手持ちギフトだけで組み合わせを計算</button>

    <div class="result-section">
        <div class="result-title">🌟 おすすめの組み合わせ</div>
        <div id="resultArea">
            <div class="no-result">ギフトを選択・入力し、ボタンを押すと計算結果が表示されます。</div>
        </div>
        <div id="perfectResultArea"></div>
    </div>
</div>

<script>
    const masterGifts = [
        { name: "さくら", pt: 5 }, { name: "桃色ハート", pt: 5 }, { name: "クラウン", pt: 25 },
        { name: "ミントみず", pt: 5 }, { name: "チェリーぷち", pt: 25 }, { name: "てるてる坊主", pt: 40 },
        { name: "フィンちゃん", pt: 5 }, { name: "わくわくマイク", pt: 50 }, { name: "星の瓶", pt: 190 },
        { name: "愛の花", pt: 250 }, { name: "虹", pt: 250 }, { name: "満月結晶", pt: 250 },
        { name: "時間結晶", pt: 250 }, { name: "パフェちゃん", pt: 500 }, { name: "ハート風船", pt: 790 },
        { name: "宝冠結晶", pt: 790 }, { name: "フルーツぱち", pt: 1000 }, { name: "クラッカー", pt: 1540 },
        { name: "虹ユニコーン", pt: 1540 }, { name: "記憶結晶", pt: 1540 }, { name: "宇宙観覧車", pt: 2540 },
        { name: "契約結晶", pt: 2540 }
    ];

    const STORAGE_KEY = 'gravity_v4_perfect_data';
    let state = {
        accounts: { 'main': { name: 'メイン垢', gifts: {}, order: [] } },
        currentId: 'main'
    };

    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { try { state = JSON.parse(saved); } catch(e) {} }
        if (!state.accounts || !state.currentId || !state.accounts[state.currentId]) {
            state = { accounts: { 'main': { name: 'メイン垢', gifts: {}, order: [] } }, currentId: 'main' };
        }
        buildSelector();
        renderAccounts();
        renderGifts();
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function buildSelector() {
        const sel = document.getElementById('giftSelector');
        sel.innerHTML = '<option value="">-- ギフト一覧から選ぶ --</option>';
        masterGifts.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g.name; opt.innerText = `${g.name} (${g.pt}pt)`;
            sel.appendChild(opt);
        });
    }

    function renderAccounts() {
        const sel = document.getElementById('accountSelector');
        sel.innerHTML = '';
        Object.keys(state.accounts).forEach(id => {
            const opt = document.createElement('option');
            opt.value = id; opt.innerText = state.accounts[id].name;
            if (id === state.currentId) opt.selected = true;
            sel.appendChild(opt);
        });
    }

    function switchAccount(id) { state.currentId = id; save(); renderGifts(); updateTargetDisplay(); }

    function addNewAccount() {
        const name = prompt("アカウント名を入力してください：", "サブ垢");
        if (!name || !name.trim()) return;
        const id = 'acc_' + Date.now();
        state.accounts[id] = { name: name.trim(), gifts: {}, order: [] };
        state.currentId = id;
        save(); renderAccounts(); renderGifts(); updateTargetDisplay();
    }

    function renameCurrentAccount() {
        const name = prompt("新しいアカウント名：", state.accounts[state.currentId].name);
        if (!name || !name.trim()) return;
        state.accounts[state.currentId].name = name.trim();
        save(); renderAccounts();
    }

    function deleteCurrentAccount() {
        if (Object.keys(state.accounts).length <= 1) { alert("これ以上削除できません。"); return; }
        if (!confirm("このアカウントのデータを完全に削除しますか？")) return;
        delete state.accounts[state.currentId];
        state.currentId = Object.keys(state.accounts)[0];
        save(); renderAccounts(); renderGifts(); updateTargetDisplay();
    }

    function addGiftFromSelector() {
        const sel = document.getElementById('giftSelector');
        const name = sel.value; if (!name) return;
        const acc = state.accounts[state.currentId];
        if (!acc.gifts[name]) {
            acc.gifts[name] = { total: 0, expCount: 0, days: 0 };
            acc.order.unshift(name);
        }
        sel.value = ''; save(); renderGifts();
    }

    function removeGift(name) {
        const acc = state.accounts[state.currentId];
        delete acc.gifts[name];
        acc.order = acc.order.filter(n => n !== name);
        save(); renderGifts();
    }

    function updateGiftValue(name, field, val) {
        const acc = state.accounts[state.currentId];
        if (!acc.gifts[name]) return;
        let num = parseInt(val, 10) || 0; if (num < 0) num = 0;

        if (field === 'days') {
            if (num > 6) num = 6; acc.gifts[name].days = num;
        } else if (field === 'total') {
            acc.gifts[name].total = num;
            if (num < acc.gifts[name].expCount) acc.gifts[name].expCount = num;
        } else if (field === 'expCount') {
            if (num > acc.gifts[name].total) num = acc.gifts[name].total;
            acc.gifts[name].expCount = num;
        }
        save();
        document.getElementById(`total-${name}`).value = acc.gifts[name].total;
        document.getElementById(`expCount-${name}`).value = acc.gifts[name].expCount;
        document.getElementById(`days-${name}`).value = acc.gifts[name].days;
    }

    function changeStep(name, field, amount) {
        const acc = state.accounts[state.currentId];
        updateGiftValue(name, field, acc.gifts[name][field] + amount);
    }

    function renderGifts() {
        const container = document.getElementById('selectedGiftContainer');
        container.innerHTML = '';
        const acc = state.accounts[state.currentId];

        acc.order.forEach(name => {
            const gData = acc.gifts[name]; if (!gData) return;
            const mData = masterGifts.find(g => g.name === name);
            const item = document.createElement('div');
            item.className = 'gift-item';
            item.innerHTML = `
                <button class="remove-btn" onclick="removeGift('${name}')">✕ 削除</button>
                <div class="gift-main-info"><span class="gift-name">${name}</span><span class="gift-pt">${mData.pt} pt</span></div>
                <div class="input-row">
                    <div class="control-group"><span>総数:</span><div class="counter"><button class="btn" onclick="changeStep('${name}', 'total', -1)">-</button><input type="number" class="input-val" id="total-${name}" value="${gData.total}" oninput="updateGiftValue('${name}', 'total', this.value)"><button class="btn" onclick="changeStep('${name}', 'total', 1)">+</button></div></div>
                    <div class="control-group"><span>期限付き:</span><div class="counter"><button class="btn" onclick="changeStep('${name}', 'expCount', -1)">-</button><input type="number" class="input-val" id="expCount-${name}" value="${gData.expCount}" oninput="updateGiftValue('${name}', 'expCount', this.value)"><button class="btn" onclick="changeStep('${name}', 'expCount', 1)">+</button></div></div>
                    <div class="control-group"><span>残り日数:</span><div class="counter"><button class="btn" onclick="changeStep('${name}', 'days', -1)">-</button><input type="number" class="input-val" id="days-${name}" value="${gData.days}" oninput="updateGiftValue('${name}', 'days', this.value)"><button class="btn" onclick="changeStep('${name}', 'days', 1)">+</button></div></div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function updateTargetDisplay() {
        document.getElementById('resultArea').innerHTML = `<div class="no-result">条件が変更されました。ボタンを押すと新条件で計算します。</div>`;
        document.getElementById('perfectResultArea').innerHTML = '';
    }

    function getTargetPoints() {
        const radios = document.getElementsByName('targetMode');
        for (let r of radios) { if (r.checked) return parseInt(r.value, 10); }
        return 3000;
    }

    let globalNormalResults = [];
    let globalPerfectResult = null;

    function calculateCombinations() {
        const target = getTargetPoints();
        const acc = state.accounts[state.currentId];
        let pool = []; let totalMax = 0;

        Object.keys(acc.gifts).forEach(name => {
            const mData = masterGifts.find(g => g.name === name);
            const gData = acc.gifts[name];
            totalMax += mData.pt * gData.total;
            for (let i = 0; i < gData.expCount; i++) pool.push({ name: name, pt: mData.pt, isExp: true, days: gData.days });
            let regCount = gData.total - gData.expCount;
            for (let i = 0; i < regCount; i++) pool.push({ name: name, pt: mData.pt, isExp: false, days: 999 });
        });

        if (totalMax < target) {
            document.getElementById('resultArea').innerHTML = `<div class="no-result" style="color: #ff6666;">⚠️ ポイントが足りません！<br>目標: ${target} pt / 合計: ${totalMax} pt</div>`;
            document.getElementById('perfectResultArea').innerHTML = '';
            return;
        }

        let answers = [];
        const sortStyles = [
            (a, b) => b.pt - a.pt || a.days - b.days,
            (a, b) => a.days - b.days || b.pt - a.pt,
            (a, b) => b.pt - a.pt
        ];

        sortStyles.forEach(sortFunc => {
            let localPool = [...pool].sort(sortFunc);
            let currentSum = 0; let currentItems = [];
            for (let i = 0; i < localPool.length; i++) {
                if (currentSum >= target) break;
                let item = localPool[i];
                currentSum += item.pt; currentItems.push(item);
            }
            if (currentSum >= target) {
                let summary = {};
                currentItems.forEach(item => {
                    let k = item.name + '_' + (item.isExp ? item.days : 0);
                    if (!summary[k]) summary[k] = { name: item.name, pt: item.pt, count: 0, days: item.isExp ? item.days : 0 };
                    summary[k].count++;
                });
                answers.push({
                    gifts: Object.values(summary), total: currentSum, overPt: currentSum - target,
                    expScore: currentItems.filter(x => x.isExp).reduce((sum, x) => sum + (10 - x.days), 0)
                });
            }
        });

        let perfectCombo = findPerfectCombination(pool, target);

        answers.sort((a, b) => a.overPt - b.overPt || b.expScore - a.expScore);
        let uniqueAnswers = []; let seen = new Set();
        for (let ans of answers) {
            let hash = ans.total + '_' + JSON.stringify(ans.gifts.sort((x,y) => x.name.localeCompare(y.name)));
            if (!seen.has(hash)) { seen.add(hash); uniqueAnswers.push(ans); }
            if (uniqueAnswers.length >= 3) break;
        }

        globalNormalResults = uniqueAnswers;
        globalPerfectResult = perfectCombo;

        displayAllResults(target);
    }

    function findPerfectCombination(pool, target) {
        let sortedPool = [...pool].sort((a, b) => a.days - b.days || b.pt - a.pt);
        let dp = [];
        dp[0] = [];

        for (let item of sortedPool) {
            for (let i = target - item.pt; i >= 0; i--) {
                if (dp[i] !== undefined && dp[i + item.pt] === undefined) {
                    dp[i + item.pt] = [...dp[i], item];
                }
            }
            if (dp[target] !== undefined) break;
        }

        if (dp[target] === undefined) return null;

        let summary = {};
        dp[target].forEach(item => {
            let k = item.name + '_' + (item.isExp ? item.days : 0);
            if (!summary[k]) summary[k] = { name: item.name, pt: item.pt, count: 0, days: item.isExp ? item.days : 0 };
            summary[k].count++;
        });

        return { gifts: Object.values(summary), total: target };
    }

    function displayAllResults(targetPt) {
        const normalArea = document.getElementById('resultArea');
        const perfectArea = document.getElementById('perfectResultArea');
        normalArea.innerHTML = ''; perfectArea.innerHTML = '';

        if (globalNormalResults.length === 0) {
            normalArea.innerHTML = `<div class="no-result">組み合わせの算出に失敗しました。</div>`;
            return;
        }

        const tags = ["おすすめプランA (はみ出し最小)", "おすすめプランB", "おすすめプランC"];

        globalNormalResults.forEach((res, idx) => {
            const card = document.createElement('div');
            card.className = 'result-card';
            let sortedGifts = [...res.gifts].sort((a,b) => b.days - a.days);
            let listHTML = sortedGifts.map(g => {
                const badge = g.days > 0 ? `<span class="expiry-badge">残り${g.days}日枠</span>` : '';
                return `<li><span>${g.name} (${g.pt}pt) ${badge}</span><span>× ${g.count}</span></li>`;
            }).join('');

            card.innerHTML = `
                <div class="card-header-row">
                    <div class="card-tag">${tags[idx]}</div>
                    <div class="header-actions">
                        <button class="copy-btn" onclick="copyToClipboard(false, ${idx})">📋 コメント用にコピー</button>
                        <button class="consume-btn" onclick="consumeGifts(false, ${idx})">消費する</button>
                    </div>
                </div>
                <ul class="result-details">${listHTML}</ul>
                <div class="total-status">合計: ${res.total} pt / 目標: ${targetPt} pt (オーバー: +${res.overPt} pt)</div>
            `;
            normalArea.appendChild(card);
        });

        if (globalPerfectResult) {
            const card = document.createElement('div');
            card.className = 'result-card perfect';
            let sortedGifts = [...globalPerfectResult.gifts].sort((a,b) => b.days - a.days);
            let listHTML = sortedGifts.map(g => {
                const badge = g.days > 0 ? `<span class="expiry-badge">残り${g.days}日枠</span>` : '';
                return `<li><span>${g.name} (${g.pt}pt) ${badge}</span><span>× ${g.count}</span></li>`;
            }).join('');

            card.innerHTML = `
                <div class="card-header-row">
                    <div class="card-tag">🎯 ぴったり到達プラン</div>
                    <div class="header-actions">
                        <button class="copy-btn" onclick="copyToClipboard(true, 0)">📋 コメント用にコピー</button>
                        <button class="consume-btn" onclick="consumeGifts(true, 0)">消費する</button>
                    </div>
                </div>
                <ul class="result-details">${listHTML}</ul>
                <div class="total-status">合計: ${globalPerfectResult.total} pt / 目標: ${targetPt} pt (ぴったりクリア！)</div>
            `;
            perfectArea.appendChild(card);
        } else {
            const failBox = document.createElement('div');
            failBox.className = 'perfect-failed-msg';
            failBox.innerText = `⚠️ 現在のギフト手持ちで『ぴったり ${targetPt} pt』になる組み合わせはありませんでした。`;
            perfectArea.appendChild(failBox);
        }
    }

    // 🔥 【修正箇所】 コピー用のテキストから日数情報を完全にカット
    function copyToClipboard(isPerfect, index) {
        const plan = isPerfect ? globalPerfectResult : globalNormalResults[index];
        if (!plan) return;

        // 同じギフト名（期限付き・通常問わず）を純粋に合算して「ギフト名: 個数個」にまとめる
        let combinedGifts = {};
        plan.gifts.forEach(g => {
            if (!combinedGifts[g.name]) {
                combinedGifts[g.name] = 0;
            }
            combinedGifts[g.name] += g.count;
        });

        let textLines = Object.keys(combinedGifts).map(name => {
            return `${name}: ${combinedGifts[name]}個`;
        });
        let textToCopy = textLines.join('\n');

        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("📋 ルームコメント用のテキストをコピーしました！\n\n" + textToCopy);
        }).catch(err => {
            alert("コピーに失敗しました。ブラウザの権限を確認してください。");
        });
    }

    function consumeGifts(isPerfect, index) {
        if (!confirm("このプランで使用した分のギフトを手持ちからマイナスします。よろしいですか？")) return;
        const plan = isPerfect ? globalPerfectResult : globalNormalResults[index];
        const acc = state.accounts[state.currentId];

        plan.gifts.forEach(used => {
            const targetGift = acc.gifts[used.name]; if (!targetGift) return;
            if (used.days > 0) {
                targetGift.expCount -= used.count; targetGift.total -= used.count;
            } else {
                targetGift.total -= used.count;
            }
            if (targetGift.expCount < 0) targetGift.expCount = 0;
            if (targetGift.total < 0) targetGift.total = 0;
            if (targetGift.total < targetGift.expCount) targetGift.expCount = targetGift.total;
            if (targetGift.expCount === 0) targetGift.days = 0;
        });

        save(); renderGifts();
        document.getElementById('resultArea').innerHTML = `<div class="no-result" style="color: #2bc4bf; font-weight: bold;">🎉 消費完了しました！手持ちデータを更新しました。</div>`;
        document.getElementById('perfectResultArea').innerHTML = '';
    }

    init();
</script>
