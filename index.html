<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity 箱あけ計算ツール (マルチアカウント対応版)</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1b113a 0%, #0b071e 100%);
            color: #e0d7ff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #aa99ff;
            text-shadow: 0 0 10px rgba(170, 153, 255, 0.5);
            margin-bottom: 20px;
        }
        
        /* 👥 アカウント管理エリア */
        .account-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(170, 153, 255, 0.4);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .account-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #aa99ff;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .account-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .account-select {
            flex: 1;
            min-width: 150px;
            padding: 8px;
            background: #1b113a;
            color: white;
            border: 1px solid #7b2cbf;
            border-radius: 6px;
            font-weight: bold;
        }
        .acc-btn {
            background: #4a3b8c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
        }
        .acc-btn:hover { background: #5c4da3; }
        .acc-btn.delete { background: #cc3333; }
        .acc-btn.delete:hover { background: #e54444; }

        .mode-selector-box {
            background: rgba(170, 153, 255, 0.15);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(170, 153, 255, 0.3);
            text-align: center;
        }
        .mode-selector-box p {
            margin: 0 0 10px 0;
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
        }
        .radio-group {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .radio-label {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(170, 153, 255, 0.2);
            transition: all 0.2s;
            font-weight: bold;
            text-align: center;
        }
        .radio-label:hover {
            background: rgba(170, 153, 255, 0.1);
        }
        .radio-group input[type="radio"] {
            display: none;
        }
        .radio-group input[type="radio"]:checked + .radio-label {
            background: linear-gradient(135deg, #7b2cbf 0%, #9d4edd 100%);
            border-color: #aa99ff;
            color: #fff;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
        }

        .selector-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .selector-box label {
            font-size: 0.9rem;
            color: #aa99ff;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #25194d;
            color: white;
            border: 1px solid #4a3b8c;
            font-size: 1rem;
            cursor: pointer;
        }

        .gift-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        .gift-item {
            background: rgba(255, 255, 255, 0.06);
            padding: 15px;
            border-radius: 14px;
            border: 1px solid rgba(170, 153, 255, 0.15);
            position: relative;
        }
        .remove-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: transparent;
            color: #ff6666;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .gift-main-info {
            margin-bottom: 12px;
        }
        .gift-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }
        .gift-pt {
            font-size: 0.85rem;
            color: #aa99ff;
            margin-left: 10px;
        }
        
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 10px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .counter {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn {
            background: #4a3b8c;
            color: white;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover { background: #5c4da3; }
        
        .input-val {
            width: 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(170, 153, 255, 0.3);
            color: white;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 4px;
            border-radius: 4px;
        }

        .calc-btn {
            width: 100%;
            background: linear-gradient(135deg, #7b2cbf 0%, #9d4edd 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4);
        }
        .calc-btn:hover { opacity: 0.9; }

        .result-section { margin-top: 25px; }
        .result-title {
            font-size: 1.1rem;
            color: #aa99ff;
            margin-bottom: 15px;
            border-left: 4px solid #7b2cbf;
            padding-left: 10px;
        }
        .result-card {
            background: rgba(123, 44, 191, 0.15);
            border: 1px solid rgba(157, 78, 221, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .card-tag {
            display: inline-block;
            background: #7b2cbf;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: bold;
        }
        .consume-btn {
            background: #2bc4bf;
            color: #0b071e;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .consume-btn:hover { opacity: 0.9; }

        .result-details { list-style: none; padding: 0; margin: 0 0 10px 0; }
        .result-details li {
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
        }
        .expiry-badge {
            background: #ff4d4d;
            color: white;
            font-size: 0.75rem;
            padding: 1px 6px;
            border-radius: 4px;
            margin-left: 5px;
            font-weight: bold;
        }
        .total-status {
            text-align: right;
            font-weight: bold;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 8px;
            color: #ff99dd;
        }
        .no-result { text-align: center; color: #8a7ccb; padding: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌌 Gravity 箱あけ計算ツール</h1>
    
    <div class="account-box">
        <div class="account-title">👥 操作中のアカウント：</div>
        <div class="account-controls">
            <select id="accountSelector" class="account-select" onchange="switchAccount(this.value)"></select>
            <button class="acc-btn" onclick="addNewAccount()">➕ 追加</button>
            <button class="acc-btn" onclick="renameCurrentAccount()">✏️ 名前変更</button>
            <button class="acc-btn delete" onclick="deleteCurrentAccount()">🗑️ 削除</button>
        </div>
    </div>

    <div class="mode-selector-box">
        <p>✨ 箱あけの種類を選択：</p>
        <div class="radio-group">
            <input type="radio" id="mode1-5" name="targetMode" value="3000" checked onchange="updateTargetDisplay()">
            <label for="mode1-5" class="radio-label">1-5<br>(3000 pt)</label>

            <input type="radio" id="mode1-6" name="targetMode" value="6000" onchange="updateTargetDisplay()">
            <label for="mode1-6" class="radio-label">1-6<br>(6000 pt)</label>

            <input type="radio" id="mode1-7" name="targetMode" value="9000" onchange="updateTargetDisplay()">
            <label for="mode1-7" class="radio-label">1-7<br>(9000 pt)</label>
        </div>
    </div>

    <div class="selector-box">
        <label for="giftSelector">🎁 手持ちのギフトを選択して追加：</label>
        <select id="giftSelector" onchange="addGiftFromSelector()">
            <option value="">-- ギフト一覧から選ぶ --</option>
        </select>
    </div>

    <div class="gift-list" id="selectedGiftContainer"></div>

    <button class="calc-btn" onclick="calculateCombinations()">手持ちギフトだけで組み合わせを計算</button>

    <div class="result-section">
        <div class="result-title">🌟 おすすめの組み合わせ</div>
        <div id="resultArea">
            <div class="no-result">ギフトを選択・入力し、ボタンを押すと計算結果が表示されます。</div>
        </div>
    </div>
</div>

<script>
    const masterGifts = [
        { name: "さくら", pt: 5 }, { name: "桃色ハート", pt: 5 }, { name: "クラウン", pt: 25 },
        { name: "ミントみず", pt: 5 }, { name: "チェリーぷち", pt: 25 }, { name: "てるてる坊主", pt: 40 },
        { name: "フィンちゃん", pt: 5 }, { name: "わくわくマイク", pt: 50 }, { name: "星の瓶", pt: 190 },
        { name: "愛の花", pt: 250 }, { name: "虹", pt: 250 }, { name: "満月結晶", pt: 250 },
        { name: "時間結晶", pt: 250 }, { name: "パフェちゃん", pt: 500 }, { name: "ハート風船", pt: 790 },
        { name: "宝冠結晶", pt: 790 }, { name: "フルーツぱち", pt: 1000 }, { name: "クラッカー", pt: 1540 },
        { name: "虹ユニコーン", pt: 1540 }, { name: "記憶結晶", pt: 1540 }, { name: "宇宙観覧車", pt: 2540 },
        { name: "契約結晶", pt: 2540 }
    ];

    // ローカルストレージ用のキー
    const ACCOUNTS_DATA_KEY = 'gravity_multacc_gifts_data';
    const CURRENT_ACC_KEY = 'gravity_current_acc_id';

    // データ全体の構造: { accounts: { 'id1': { name: 'メイン', gifts: {...} } }, currentId: 'id1' }
    let appState = {
        accounts: {
            'main_default': { name: 'メイン垢', gifts: {} }
        },
        currentId: 'main_default'
    };

    let activeGifts = {}; // 現在アクティブなアカウントのギフトデータ参照用

    // アプリ初期化：ロードとアカウントセレクトの構築
    function initApp() {
        const savedData = localStorage.getItem(ACCOUNTS_DATA_KEY);
        const savedCurrentId = localStorage.getItem(CURRENT_ACC_KEY);

        if (savedData) {
            try { appState = JSON.parse(savedData); } catch(e) {}
        }
        if (savedCurrentId && appState.accounts[savedCurrentId]) {
            appState.currentId = savedCurrentId;
        } else {
            // 現在のIDが消失していれば存在する最初のキーにする
            appState.currentId = Object.keys(appState.accounts)[0] || 'main_default';
        }

        activeGifts = appState.accounts[appState.currentId].gifts;

        // ドロップダウンなどの初期化
        initSelector();
        renderAccountSelector();
        renderSelectedGifts();
    }

    function saveToStorage() {
        localStorage.setItem(ACCOUNTS_DATA_KEY, JSON.stringify(appState));
        localStorage.setItem(CURRENT_ACC_KEY, appState.currentId);
    }

    // アカウントのセレクトボックスの描画
    function renderAccountSelector() {
        const selector = document.getElementById('accountSelector');
        selector.innerHTML = '';
        Object.keys(appState.accounts).forEach(id => {
            const opt = document.createElement('option');
            opt.value = id;
            opt.innerText = appState.accounts[id].name;
            if (id === appState.currentId) opt.selected = true;
            selector.appendChild(opt);
        });
    }

    // アカウント切り替え
    function switchAccount(id) {
        if (!appState.accounts[id]) return;
        appState.currentId = id;
        activeGifts = appState.accounts[id].gifts;
        saveToStorage();
        renderSelectedGifts();
        updateTargetDisplay();
    }

    // アカウント追加
    function addNewAccount() {
        const name = prompt("新しいアカウントの名前を入力してください：", "サブ垢");
        if (!name || !name.trim()) return;

        const id = 'acc_' + Date.now();
        appState.accounts[id] = { name: name.trim(), gifts: {} };
        appState.currentId = id;
        activeGifts = appState.accounts[id].gifts;

        saveToStorage();
        renderAccountSelector();
        renderSelectedGifts();
        updateTargetDisplay();
    }

    // アカウント名変更
    function renameCurrentAccount() {
        const currentAcc = appState.accounts[appState.currentId];
        const newName = prompt("アカウント名を変更：", currentAcc.name);
        if (!newName || !newName.trim()) return;

        currentAcc.name = newName.trim();
        saveToStorage();
        renderAccountSelector();
    }

    // アカウント削除
    function deleteCurrentAccount() {
        const keys = Object.keys(appState.accounts);
        if (keys.length <= 1) {
            alert("これ以上アカウントを削除できません（最低1つ必要です）。");
            return;
        }

        const currentName = appState.accounts[appState.currentId].name;
        if (!confirm(`「${currentName}」のギフトデータを完全に削除します。よろしいですか？`)) {
            return;
        }

        delete appState.accounts[appState.currentId];
        // 残った最初のアカウントに切り替える
        appState.currentId = Object.keys(appState.accounts)[0];
        activeGifts = appState.accounts[appState.currentId].gifts;

        saveToStorage();
        renderAccountSelector();
        renderSelectedGifts();
        updateTargetDisplay();
    }

    function initSelector() {
        const selector = document.getElementById('giftSelector');
        masterGifts.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g.name;
            opt.innerText = `${g.name} (${g.pt}pt)`;
            selector.appendChild(opt);
        });
    }

    function addGiftFromSelector() {
        const selector = document.getElementById('giftSelector');
        const name = selector.value;
        if (!name) return;

        if (!activeGifts[name]) {
            activeGifts[name] = { total: 0, expCount: 0, days: 0 };
            renderSelectedGifts();
            saveToStorage();
        }
        selector.value = "";
    }

    function removeGift(name) {
        delete activeGifts[name];
        renderSelectedGifts();
        saveToStorage();
    }

    function renderSelectedGifts() {
        const container = document.getElementById('selectedGiftContainer');
        container.innerHTML = '';

        Object.keys(activeGifts).forEach(name => {
            const giftData = masterGifts.find(g => g.name === name);
            const state = activeGifts[name];

            const item = document.createElement('div');
            item.className = 'gift-item';
            item.innerHTML = `
                <button class="remove-btn" onclick="removeGift('${name}')">✕ 削除</button>
                <div class="gift-main-info">
                    <span class="gift-name">${name}</span>
                    <span class="gift-pt">${giftData.pt} pt</span>
                </div>
                <div class="input-row">
                    <div class="control-group">
                        <span>持っている総数:</span>
                        <div class="counter">
                            <button class="btn" onclick="stepValue('${name}', 'total', -1)">-</button>
                            <input type="number" class="input-val" id="total-${name}" value="${state.total}" min="0" onchange="directInput('${name}', 'total', this.value)">
                            <button class="btn" onclick="stepValue('${name}', 'total', 1)">+</button>
                        </div>
                    </div>
                    <div class="control-group">
                        <span>うち期限付きの数:</span>
                        <div class="counter">
                            <button class="btn" onclick="stepValue('${name}', 'expCount', -1)">-</button>
                            <input type="number" class="input-val" id="expCount-${name}" value="${state.expCount}" min="0" onchange="directInput('${name}', 'expCount', this.value)">
                            <button class="btn" onclick="stepValue('${name}', 'expCount', 1)">+</button>
                        </div>
                    </div>
                    <div class="control-group">
                        <span>残り日数 (1〜6):</span>
                        <div class="counter">
                            <button class="btn" onclick="stepValue('${name}', 'days', -1)">-</button>
                            <input type="number" class="input-val" id="days-${name}" value="${state.days}" min="0" max="6" onchange="stepValue('${name}', 'days', 0)">
                            <button class="btn" onclick="stepValue('${name}', 'days', 1)">+</button>
                        </div>
                    </div>
                </div>
            `;
        container.appendChild(item);
        });
    }

    function stepValue(name, field, change) {
        let val = activeGifts[name][field];
        let next = val + change;
        
        if (field === 'days') {
            if (next < 0) next = 0;
            if (next > 6) next = 6;
        } else {
            if (next < 0) next = 0;
        }

        if (field === 'expCount' && next > activeGifts[name].total) {
            next = activeGifts[name].total;
        }
        if (field === 'total' && next < activeGifts[name].expCount) {
            activeGifts[name].expCount = next;
            document.getElementById(`expCount-${name}`).value = next;
        }

        activeGifts[name][field] = next;
        document.getElementById(`${field}-${name}`).value = next;
        saveToStorage();
    }

    function directInput(name, field, val) {
        let next = parseInt(val, 10) || 0;
        if (next < 0) next = 0;

        if (field === 'days') {
            if (next > 6) next = 6;
        }

        activeGifts[name][field] = next;

        if (field === 'expCount' && next > activeGifts[name].total) {
            next = activeGifts[name].total;
            activeGifts[name].expCount = next;
        }
        if (field === 'total' && next < activeGifts[name].expCount) {
            activeGifts[name].expCount = next;
            document.getElementById(`expCount-${name}`).value = next;
        }

        document.getElementById(`${field}-${name}`).value = next;
        saveToStorage();
    }

    function updateTargetDisplay() {
        document.getElementById('resultArea').innerHTML = `
            <div class="no-result">条件が変更されました。ボタンを押すと新しい条件で計算します。</div>
        `;
    }

    function getTargetPoints() {
        const radios = document.getElementsByName('targetMode');
        for (let radio of radios) {
            if (radio.checked) {
                return parseInt(radio.value, 10);
            }
        }
        return 3000;
    }

    let currentCalculatedResults = [];

    function calculateCombinations() {
        const target = getTargetPoints(); 
        let mandatoryGifts = [];  
        let regularGifts = [];    
        let basePoints = 0;
        let totalAvailablePoints = 0;

        Object.keys(activeGifts).forEach(name => {
            const giftData = masterGifts.find(g => g.name === name);
            const state = activeGifts[name];

            totalAvailablePoints += giftData.pt * state.total;

            if (state.expCount > 0 && state.days > 0) {
                mandatoryGifts.push({
                    name: name,
                    pt: giftData.pt,
                    count: state.expCount,
                    days: state.days
                });
                basePoints += giftData.pt * state.expCount;
            }

            const regularCount = state.total - state.expCount;
            if (regularCount > 0) {
                regularGifts.push({
                    name: name,
                    pt: giftData.pt,
                    count: regularCount,
                    days: 0
                });
            }
        });

        if (totalAvailablePoints < target) {
            document.getElementById('resultArea').innerHTML = `
                <div class="no-result" style="color: #ff6666;">
                    ⚠️ ポイントが足りません！<br>
                    現在の目標は <strong>${target} pt</strong> ですが、このアカウントの手持ち合計は <strong>${totalAvailablePoints} pt</strong> です。<br>
                    ギフトを増やすか、別のアカウントに切り替えてみてください。
                </div>
            `;
            return;
        }

        mandatoryGifts.sort((a, b) => a.days - b.days);

        if (basePoints >= target) {
            currentCalculatedResults = [{ tag: "期限付きギフトのみで達成！", gifts: mandatoryGifts, total: basePoints }];
            displayResults(currentCalculatedResults, target);
            return;
        }

        let remaining = target - basePoints;
        let solutions = [];

        let poolGifts = regularGifts.map(rg => ({ ...rg }));
        poolGifts.sort((a, b) => b.pt - a.pt);

        function findSolutions(index, currentSum, currentCombo) {
            if (currentSum === remaining) {
                solutions.push([...currentCombo]);
                return;
            }
            if (currentSum > remaining || index >= poolGifts.length || solutions.length >= 3) {
                return;
            }

            const gift = poolGifts[index];
            let maxUse = Math.floor((remaining - currentSum) / gift.pt);
            if (maxUse > gift.count) {
                maxUse = gift.count;
            }

            for (let i = maxUse; i >= 0; i--) {
                if (i > 0) {
                    currentCombo.push({ name: gift.name, pt: gift.pt, count: i, days: 0 });
                }
                findSolutions(index + 1, currentSum + (gift.pt * i), currentCombo);
                if (i > 0) {
                    currentCombo.pop();
                }
                if (solutions.length >= 3) return;
            }
        }

        findSolutions(0, 0, []);

        if (solutions.length === 0) {
            document.getElementById('resultArea').innerHTML = `
                <div class="no-result">
                    ぴったり${target}ptにする組み合わせが見つかりませんでした。<br>
                    微調整用ギフトを追加するか、個数を変更してください。
                </div>
            `;
            return;
        }

        const tags = ["おすすめルートA", "おすすめルートB", "おすすめルートC"];
        currentCalculatedResults = solutions.map((sol, idx) => {
            let mergedGifts = mandatoryGifts.map(mg => ({ ...mg }));

            sol.forEach(sGift => {
                let existing = mergedGifts.find(mg => mg.name === sGift.name && mg.days === 0);
                if (existing) {
                    existing.count += sGift.count;
                } else {
                    mergedGifts.push({ ...sGift });
                }
            });

            return {
                tag: tags[idx] || "おすすめルート",
                gifts: mergedGifts,
                total: target
            };
        });

        displayResults(currentCalculatedResults, target);
    }

    function displayResults(results, targetPt) {
        const resultArea = document.getElementById('resultArea');
        resultArea.innerHTML = '';

        results.forEach((res, resIdx) => {
            const card = document.createElement('div');
            card.className = 'result-card';
            
            let listItems = res.gifts.map(g => {
                const expiryLabel = g.days > 0 ? `<span class="expiry-badge">残り${g.days}日枠</span>` : '';
                return `
                    <li>
                        <span>${g.name} (${g.pt}pt) ${expiryLabel}</span>
                        <span>× ${g.count}</span>
                    </li>
                `;
            }).join('');

            card.innerHTML = `
                <div class="card-header-row">
                    <div class="card-tag">${res.tag}</div>
                    <button class="consume-btn" onclick="consumeGifts(${resIdx})">このプラン分を消費する</button>
                </div>
                <ul class="result-details">${listItems}</ul>
                <div class="total-status">合計: ${res.total} pt / 目標: ${targetPt} pt</div>
            `;
            resultArea.appendChild(card);
        });
    }

    function consumeGifts(index) {
        if (!confirm("このプランで使用した分のギフトを手持ちからマイナスします。よろしいですか？")) {
            return;
        }

        const selectedPlan = currentCalculatedResults[index];
        if (!selectedPlan) return;

        selectedPlan.gifts.forEach(usedGift => {
            const current = activeGifts[usedGift.name];
            if (!current) return;

            if (usedGift.days > 0) {
                current.expCount -= usedGift.count;
                current.total -= usedGift.count;
            } else {
                current.total -= usedGift.count;
            }

            if (current.expCount < 0) current.expCount = 0;
            if (current.total < 0) current.total = 0;
            if (current.total < current.expCount) current.expCount = current.total;

            if (current.expCount === 0) current.days = 0;
        });

        renderSelectedGifts();
        saveToStorage();
        document.getElementById('resultArea').innerHTML = `
            <div class="no-result" style="color: #2bc4bf; font-weight: bold;">
                🎉 このアカウントのデータを更新しました！
            </div>
        `;
    }

    // アプリ起動
    initApp();
</script>

</body>
